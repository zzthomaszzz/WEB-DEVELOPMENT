<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <title>Task A - Running Total</title>
</head>
<body>
    <h1>Web Development - Lab 7</h1>
    <h2>Task A - Running Total 1 to 10</h2>
    <script type="text/javascript">
        var total = 0;
        for (var i = 1; i <= 10; i++) {
            total += i;
            document.write("<p>" + i + ": subtotal = " + total + "</p>");
        }
    </script>
</body>
</html>
