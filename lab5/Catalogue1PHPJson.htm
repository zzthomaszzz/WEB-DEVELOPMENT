<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <title>Book Catalogue</title>
    <script type="text/javascript" src="CartJson.js"></script>
</head>
<body>
    <h1>Web Development - Lab 5</h1>
    <h2>Book Catalogue</h2>

    <div id="books-container"></div>

    <br />
    <h2>Shopping Cart</h2>
    <span id="cart"></span>

    <script>
        window.onload = function() {
            fetch("books.php")
                .then(function(response) {
                    return response.json();
                })
                .then(function(books) {
                    var container = document.getElementById("books-container");
                    books.forEach(function(book) {
                        container.innerHTML +=
                            "<div style='border:1px solid #ccc; padding:10px; margin:10px; display:inline-block; vertical-align:top; width:200px;'>" +
                            "<b>Book:</b> " + book.title + "<br />" +
                            "<b>Authors:</b> " + book.authors + "<br />" +
                            "<b>ISBN:</b> " + book.isbn + "<br />" +
                            "<b>Price:</b> $" + parseFloat(book.price).toFixed(2) + "<br /><br />" +
                            "<a href='#' onclick='AddRemoveItem(\"Add\", \"" + book.title.replace(/"/g, '\\"') + "\"); return false;'>Add to Cart</a>" +
                            "</div>";
                    });
                })
                .catch(function(error) {
                    document.getElementById("books-container").innerHTML = "<p>Failed to load books.</p>";
                });
        };
    </script>
</body>
</html>
